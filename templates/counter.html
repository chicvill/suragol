<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ store.name }} - 통합 카운터</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --accent: #3b82f6; --bg: #000; --card: #111; --text: #fff; --gold: #f1c40f; }
        body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; margin: 0; }
        header { background: #111; padding: 15px 20px; border-bottom: 2px solid #222; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:100; }
        .tables-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; padding: 15px; }
        .table-card { background: var(--card); border: 2px solid #222; border-radius: 12px; padding: 15px; position: relative; animation: fadeIn 0.3s; }
        .table-card.active { border-color: var(--accent); }
        .tag { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; font-weight: 800; margin-bottom: 10px; display: inline-block; }
        .tag-조리 { background: #444; }
        .tag-서빙 { background: var(--accent); }
        .tag-식사 { background: #059669; }
        .price { font-size: 1.2rem; font-weight: 900; color: var(--gold); margin: 10px 0; }
        .items { font-size: 0.85rem; color: #ccc; margin-bottom: 15px; min-height: 40px; }
        .btns { display: flex; gap: 5px; }
        .btn { flex: 1; border: none; padding: 12px; border-radius: 8px; font-weight: 900; cursor: pointer; font-size: 0.8rem; }
        .btn-main { background: var(--accent); color: #fff; }
        .btn-cancel { background: #333; color: #ff6b6b; border: 1px solid #444; }
        #notif-stack { position: fixed; bottom: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column-reverse; gap: 10px; width: 300px; }
        .notif { padding: 20px; border-radius: 15px; color: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: slide 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slide { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>
    <header>
        <div style="display:flex; align-items:center; gap:20px;">
            <h1 style="margin:0; font-size:1.2rem; color:var(--gold);">{{ store.name }} 카운터</h1>
            <button onclick="totalReset()" style="background:#e74c3c; color:white; border:none; padding:5px 10px; border-radius:5px; font-weight:bold; cursor:pointer; font-size:0.75rem;">🛠️ 모든 주문 데이터 초기화 (유령 주문 삭제)</button>
        </div>
        <button onclick="forceReSync()" style="background:none; border:none; color:#666;"><i data-lucide="refresh-cw"></i></button>
    </header>

    <div class="tables-grid" id="tables-grid"></div>
    <div id="notif-stack"></div>

    <script>
        lucide.createIcons();
        let sessions = {};
        const socket = io();

        socket.on('connect', () => {
            socket.emit('join', { store_id: '{{ store.id }}' });
            forceReSync();
        });

        // 실시간 연동
        socket.on('new_order', forceReSync);
        socket.on('order_status_update', forceReSync);
        socket.on('table_status_update', forceReSync);
        socket.on('new_service_request', (d) => createNotif('call', d));
        socket.on('bank_deposit_received', (d) => createNotif('pay', d));

        async function totalReset() {
            if(!confirm('🚨 주의: 현재 진행 중인 모든 주문과 유령 주문이 DB에서 완전히 삭제됩니다.\n영업 시작 전이나 데이터가 심하게 꼬였을 때만 사용하세요. 진행할까요?')) return;
            try {
                await fetch(`/api/{{ store.id }}/stats/reset`, { method: 'POST' }); 
                alert('모든 주문 데이터가 초기화되었습니다. 화면을 새로고침합니다.');
                location.reload();
            } catch(e) { alert('초기화 실패: ' + e); }
        }

        async function forceReSync() {
            try {
                const res = await fetch(`/api/{{ store.id }}/orders`);
                const orders = await res.json();
                sessions = {};
                orders.forEach(o => {
                    if (o.status === 'cancelled') return;
                    const sid = o.session_id || `legacy-${o.table_id}`;
                    if (!sessions[sid]) sessions[sid] = { table_id: o.table_id, orders: {}, total: 0, status: 'pending', is_prepaid: false };
                    sessions[sid].orders[o.id] = o;
                    if (o.is_prepaid) sessions[sid].is_prepaid = true;
                });
                render();
            } catch (e) { console.error(e); }
        }

        function render() {
            const grid = document.getElementById('tables-grid');
            grid.innerHTML = '';
            const list = Object.values(sessions).sort((a,b) => a.table_id - b.table_id);
            if(list.length === 0) { grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:50px; color:#444;">진행 중인 주문이 없습니다.</div>'; return; }

            list.forEach(s => {
                const sid = Object.keys(sessions).find(k => sessions[k] === s);
                const ol = Object.values(s.orders);
                const isPaid = s.is_prepaid;
                const anyReady = ol.some(o => o.status === 'ready');
                const allServed = ol.every(o => o.status === 'served');
                const status = anyReady ? '서빙' : (allServed ? '식사' : '조리');
                const total = ol.reduce((sm, o) => sm + (o.items || []).filter(i=>i.status!=='cancelled').reduce((ism, i) => ism + (i.price * i.quantity), 0), 0);

                const card = document.createElement('div');
                card.className = `table-card ${status !== '조리' ? 'active' : ''}`;
                card.innerHTML = `
                    <div class="tag tag-${status}">${status}</div>
                    <div style="font-size:1.4rem; font-weight:900;">${s.table_id}번 테이블</div>
                    <div class="items">${ol.flatMap(o => (o.items||[]).filter(i=>i.status!=='cancelled').map(i=>`<div>${i.name} x ${i.quantity}</div>`)).join('')}</div>
                    <div class="price">${total.toLocaleString()}원</div>
                    ${isPaid ? '<div style="background:var(--gold); color:#000; padding:4px; border-radius:4px; font-size:0.75rem; font-weight:900; margin-bottom:10px; text-align:center;">✨ 선결제 완료</div>' : ''}
                    <div class="btns">
                        ${status === '서빙' ? `<button class="btn btn-main" onclick="executeServe('${sid}')">서빙</button>` : ''}
                        ${status === '식사' ? `<button class="btn btn-main" onclick="executePay('${s.table_id}')">퇴실</button>` : ''}
                        <button class="btn btn-cancel" onclick="executeCancel('${sid}')" title="강제 취소">취소</button>
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        async function executeServe(sid) { socket.emit('set_served', { store_id: '{{ store.id }}', session_id: sid, table_id: sessions[sid].table_id }); setTimeout(forceReSync, 500); }
        async function executePay(tId) { if(confirm('결제 및 퇴실 처리할까요?')) { await fetch(`/api/{{ store.id }}/table/${tId}/pay`, { method: 'POST' }); forceReSync(); } }
        async function executeCancel(sid) { if(confirm('정말 이 주문을 강제 취소할까요? (9시간 경과 주문 등 정리용)')) { for(let id of Object.keys(sessions[sid].orders)) await fetch(`/api/order/${id}/cancel`, { method: 'POST' }); forceReSync(); } }

        function createNotif(type, d) {
            const stack = document.getElementById('notif-stack');
            const card = document.createElement('div');
            card.className = 'notif';
            card.style.background = type === 'pay' ? '#2563eb' : '#dc2626';
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; font-size:0.7rem; font-weight:800; margin-bottom:5px;"><span>${type==='pay'?'💰 입금':'🆘 호출'}</span><span onclick="this.parentElement.parentElement.remove()">×</span></div>
                <div style="font-weight:900;">${d.sender || `테이블 ${d.table_id || '??'}`}</div>
                <div style="font-size:0.9rem; margin-top:5px;">${d.amount?d.amount.toLocaleString()+'원':d.content||'확인 부탁드립니다.'}</div>
                <button onclick="confirmTask(this, '${type}', '${d.id}')" style="width:100%; margin-top:10px; border:none; background:rgba(255,255,255,0.2); color:#fff; padding:8px; border-radius:8px; font-weight:800;">확인 완료</button>
            `;
            stack.prepend(card);
            try { new Audio("https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3").play(); } catch(e) {}
        }
        async function confirmTask(btn, type, id) {
            if(id && id !== 'undefined') await fetch(type==='pay'?`/api/{{ store.id }}/bank_notification/${id}/confirm`:`/api/{{ store.id }}/service_request/${id}/complete`, { method: 'POST' });
            btn.parentElement.remove();
            forceReSync();
        }
    </script>
</body>
</html>
