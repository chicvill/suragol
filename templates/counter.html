<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ store.name }} - 통합 카운터</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { 
            --royal-red: #8B0000;
            --royal-gold: #D4AF37;
            --bg-dark: #000000;
            --card-bg: #111111;
            --border-gold: rgba(212, 175, 55, 0.3);
            --text-muted: #888888;
        }
        
        body { background: var(--bg-dark); color: white; font-family: 'Pretendard', sans-serif; margin: 0; overflow: hidden; }
        
        header { 
            background: #111; padding: 15px 25px; border-bottom: 2px solid #222;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .main-layout { display: flex; height: calc(100vh - 70px); }

        /* 좌측 전용 사이드바 (호출 현황) */
        .sidebar { 
            width: 320px; background: #0a0a0a; border-right: 1px solid #222;
            display: flex; flex-direction: column; transition: all 0.3s;
            position: relative; z-index: 50;
        }
        
        .tables-area { flex: 1; padding: 25px; overflow-y: auto; background: #000; }

        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        /* 테이블 카드 스타일 */
        .table-card {
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 16px;
            padding: 20px;
            position: relative;
            transition: transform 0.2s, border-color 0.2s;
            display: flex; flex-direction: column;
        }
        .table-card:hover { border-color: var(--royal-gold); }
        .table-card.ready-to-serve { border: 2px solid var(--royal-gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }

        .status-badge {
            position: absolute; top: 15px; right: 20px;
            font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; font-weight: bold;
        }
        .status-pending { background: #333; color: #aaa; }
        .status-ready { background: var(--royal-gold); color: #000; }
        .status-served { background: #1e3a8a; color: #fff; }

        .items-list { margin: 15px 0; flex: 1; font-size: 0.95rem; }
        .item-row { display: flex; justify-content: space-between; margin-bottom: 5px; color: #ccc; }

        .price-total { 
            font-size: 1.5rem; font-weight: 900; color: var(--royal-gold);
            border-top: 1px solid #222; padding-top: 15px; margin-top: 10px;
        }

        .action-btn {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            font-weight: bold; cursor: pointer; margin-top: 15px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-serve { background: var(--royal-gold); color: black; }
        .btn-pay { background: var(--royal-red); color: white; }
        .btn-waiting { background: #222; color: #444; }

        /* 알림 메시지 스택 */
        #notif-stack {
            position: fixed; bottom: 25px; right: 25px;
            display: flex; flex-direction: column-reverse; gap: 12px;
            width: 320px; z-index: 2000;
        }
        .notif {
            padding: 18px; border-radius: 12px; color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            animation: slideIn 0.3s ease-out;
            border-left: 5px solid rgba(255,255,255,0.3);
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* 머지된 선결제 스타일 */
        .prepaid-badge {
            background: var(--royal-gold); color: #000; font-size: 0.75rem; font-weight: 900;
            padding: 4px 8px; border-radius: 4px; display: inline-block; margin-bottom: 10px;
        }
        /* [신규] 메모지(Post-it) 스타일 */
        .post-it {
            background: #feeaab;
            color: #222;
            padding: 18px;
            margin: 15px 10px;
            border-radius: 2px;
            box-shadow: 3px 6px 15px rgba(0,0,0,0.4);
            transform: rotate(-1.5deg);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            cursor: pointer;
            border-bottom: 3px solid rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .post-it:nth-child(even) { transform: rotate(1.8deg); background: #fef08a; }
        .post-it:hover { transform: scale(1.05) rotate(0deg); z-index: 100 !important; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        .post-it::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: rgba(0,0,0,0.05);
        }
        .waiting-note { background: #bae6fd !important; transform: rotate(1deg); }
        .waiting-note:nth-child(even) { background: #bae6fd !important; transform: rotate(-1.2deg); }

        .note-header { display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 800; margin-bottom: 8px; opacity: 0.7; }
        .note-content { font-size: 1.15rem; font-weight: 900; line-height: 1.4; }
        .note-footer { margin-top: 10px; font-size: 0.8rem; text-align: right; font-weight: bold; opacity: 0.6; }
        
        /* 확인 완료 시 날아가는 애니메이션 */
        .post-it.removing { transform: translateX(-150%) rotate(-20deg) !important; opacity: 0; }
        .waiting-note.removing { transform: translateX(150%) rotate(20deg) !important; opacity: 0; }
    </style>
</head>
<body>
    <header>
        <div style="display:flex; align-items:center; gap:20px;">
            <h1 style="margin:0; font-size:1.4rem; color:var(--royal-gold);">{{ store.name }} 통합 카운터</h1>
            <div style="display:flex; gap:10px;">
                <button onclick="totalReset()" style="background:#444; color:#fff; border:none; padding:8px 12px; border-radius:6px; cursor:pointer; font-size:0.8rem;">📦 데이터 초기화</button>
                <button onclick="forceReSync()" style="background:none; border:2px solid #333; color:#666; padding:5px 10px; border-radius:6px; cursor:pointer;"><i data-lucide="refresh-cw" size="18"></i></button>
            </div>
        </div>
        <div id="clock" style="font-weight:bold; font-size:1.1rem; color:#888;">00:00:00</div>
    </header>

    <div class="main-layout">
        <!-- 좌측: 호출 현황 -->
        <div class="sidebar" id="service-sidebar">
            <div style="padding: 20px; border-bottom: 1px solid #222; font-weight: bold; display: flex; align-items: center; gap: 10px;">
                <i data-lucide="bell-ring" style="color: var(--royal-gold);"></i> 호출 현황
            </div>
            <div id="service-request-list" style="flex: 1; overflow-y: auto; padding: 15px;">
                <div style="text-align: center; color: #444; padding: 40px 0;">호출이 없습니다.</div>
            </div>
        </div>

        <!-- 중앙: 테이블 현황 -->
        <div class="tables-area">
            <div class="tables-grid" id="tables-grid">
                <div style="text-align: center; color: #444; padding: 100px 0;">테이블 데이터를 불러오는 중...</div>
            </div>
        </div>

        <!-- 우측: 대기 현황 (필요 시 숨김/표시 가능) -->
        <div class="sidebar" id="waiting-sidebar" style="border-left: 1px solid #222; border-right: none;">
            <div style="padding: 20px; border-bottom: 1px solid #222;">
                <button onclick="enterFirstWaiting()" style="width:100%; background:var(--royal-gold); border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;">
                    <i data-lucide="check-circle" size="16"></i> 다음 대기 입장
                </button>
            </div>
            <div id="waiting-list" style="flex: 1; overflow-y: auto; padding: 15px;">
                <div style="text-align: center; color: #444; padding: 40px 0;">대기 명단 로딩 중...</div>
            </div>
        </div>
    </div>

    <div id="notif-stack"></div>

    <!-- 결제 모달 (기존 고급 기능 유지) -->
    <div id="payment-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:3000; align-items:center; justify-content:center;">
        <div style="background:#111; border:1px solid #333; padding:30px; border-radius:20px; width:400px; text-align:center;">
            <h2 id="payment-title" style="margin-top:0;">결제 확인</h2>
            <div id="payment-total-price" style="font-size:2rem; font-weight:900; color:var(--royal-gold); margin:20px 0;">0원</div>
            
            <input type="tel" id="cust-phone" placeholder="포인트 적립 휴대폰 번호" style="width:100%; padding:15px; background:#000; border:1px solid #444; color:#fff; border-radius:10px; margin-bottom:15px; text-align:center; font-size:1.2rem;">
            
            <div id="point-info-area" style="display:none; background:rgba(212,175,55,0.1); padding:15px; border-radius:10px; margin-bottom:20px; text-align:left;">
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>보유 포인트:</span><span id="cust-points" style="font-weight:bold;">0 P</span></div>
                <button id="use-points-btn" style="width:100%; background:var(--royal-gold); border:none; padding:10px; border-radius:6px; font-weight:bold; cursor:pointer; display:none;">10,000 P 사용하기</button>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <button class="action-btn btn-serve" id="payment-final-btn" style="margin:0;">결제 완료</button>
                <button onclick="closePaymentModal()" style="background:#333; border:none; color:#fff; border-radius:10px;">닫기</button>
                <button id="show-bank-qr-btn" style="grid-column:span 2; background:#0064ff; border:none; color:#fff; padding:12px; border-radius:10px; margin-top:10px; cursor:pointer;">토스 계좌이체 QR</button>
                <button id="view-mobile-receipt-btn" style="grid-column:span 2; background:#222; border:none; color:#fff; padding:10px; border-radius:10px; font-size:0.8rem; cursor:pointer;">모바일 영수증 보기</button>
            </div>

            <div id="payment-qr-area" style="display:none; margin-top:20px; padding:15px; background:#fff; border-radius:10px; color:#000;">
                <div id="payment-qrcode" style="display:inline-block;"></div>
                <p style="font-size:0.8rem; font-weight:bold; margin-top:10px;">토스 송금 링크 QR</p>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let sessions = {};
        
        socket.on('connect', () => {
            socket.emit('join', { store_id: '{{ store.id }}' });
            forceReSync();
        });

        socket.on('new_order', forceReSync);
        socket.on('order_status_update', forceReSync);
        socket.on('table_status_update', forceReSync);
        socket.on('new_service_request', (d) => { createNotif('call', d); loadServiceRequests(); });
        socket.on('bank_deposit_received', (d) => createNotif('pay', d));
        socket.on('waiting_update', loadWaitingList);

        async function forceReSync() {
            try {
                const res = await fetch(`/api/{{ store.id }}/orders`);
                const orders = await res.json();
                sessions = {};
                orders.forEach(o => {
                    if (o.status === 'cancelled' || o.status === 'paid') return;
                    const sid = o.session_id || `legacy-${o.table_id}`;
                    if (!sessions[sid]) sessions[sid] = { table_id: o.table_id, orders: {}, total: 0, status: 'pending', is_prepaid: false };
                    sessions[sid].orders[o.id] = o;
                    if(o.is_prepaid) sessions[sid].is_prepaid = true;
                });
                render();
            } catch (e) { console.error(e); }
        }

        function render() {
            const grid = document.getElementById('tables-grid');
            grid.innerHTML = '';
            const list = Object.values(sessions).sort((a,b) => a.table_id - b.table_id);
            if(list.length === 0) { 
                grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:100px; color:#444;">현재 홀에 진행 중인 주문이 없습니다.</div>'; 
                return; 
            }

            list.forEach(s => {
                const sid = Object.keys(sessions).find(k => sessions[k] === s);
                const ol = Object.values(s.orders);
                const sTotal = ol.reduce((sum, o) => sum + (o.items||[]).filter(it=>it.status!=='cancelled').reduce((ism, it) => ism + (it.price * it.quantity), 0), 0);
                
                // 결정적 상태 계산
                const anyReady = ol.some(o => o.status === 'ready');
                const allServed = ol.every(o => o.status === 'served');
                const currentStatus = anyReady ? 'ready' : (allServed ? 'served' : 'pending');

                // 현금영수증 신청 여부
                const crQuery = ol.find(o => o.cash_receipt_type);
                let crHtml = crQuery ? `
                    <div style="margin-top:10px; padding:8px; background:rgba(59,130,246,0.15); border-radius:8px; font-size:0.8rem; color:#60a5fa; border:1px solid rgba(59,130,246,0.3);">
                        📄 현금영수증: ${crQuery.cash_receipt_type === 'personal' ? '개인' : '사업자'} (${crQuery.cash_receipt_number})
                    </div>
                ` : '';

                const card = document.createElement('div');
                card.className = `table-card ${currentStatus === 'ready' ? 'ready-to-serve' : ''}`;
                card.innerHTML = `
                    <div class="status-badge status-${currentStatus}">${currentStatus==='ready'?'서빙대기':(currentStatus==='served'?'식사중':'조리중')}</div>
                    <div style="font-size:1.4rem; font-weight:900;">${s.table_id}번 테이블</div>
                    <div style="font-size:0.8rem; color:#555; margin-bottom:10px;">(${sid})</div>
                    ${s.is_prepaid ? '<div class="prepaid-badge">✨ 선결제 완료</div>' : ''}
                    <div class="items-list">
                        ${ol.flatMap(o => (o.items||[]).filter(it=>it.status!=='cancelled').map(it => `<div class="item-row"><span>${it.name}</span><span>x${it.quantity}</span></div>`)).join('')}
                    </div>
                    ${crHtml}
                    <div class="price-total">${sTotal.toLocaleString()}원</div>
                    <div class="btns">
                        ${renderActionBtn(sid, currentStatus)}
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        function renderActionBtn(sid, status) {
            if (status === 'ready') return `<button class="action-btn btn-serve" onclick="executeServe('${sid}')">서빙하기</button>`;
            if (status === 'served') return `<button class="action-btn btn-pay" onclick="executePay('${sid}')">결제/퇴실</button>`;
            return `<button class="action-btn btn-waiting" disabled>조리 중...</button>`;
        }

        async function executeServe(sid) {
            socket.emit('set_served', { store_id: '{{ store.id }}', session_id: sid, table_id: sessions[sid].table_id });
            setTimeout(forceReSync, 300);
        }

        function executePay(sid) {
            const session = sessions[sid];
            const modal = document.getElementById('payment-modal');
            const phoneInput = document.getElementById('cust-phone');
            const totalDisplay = document.getElementById('payment-total-price');
            
            totalDisplay.innerText = Object.values(session.orders).reduce((sum, o) => sum + o.total_price, 0).toLocaleString() + '원';
            modal.style.display = 'flex';
            
            document.getElementById('payment-final-btn').onclick = () => {
                socket.emit('set_paid', { 
                    store_id: '{{ store.id }}', 
                    session_id: sid, 
                    table_id: session.table_id,
                    phone: phoneInput.value.replace(/[^0-9]/g, '')
                });
                closePaymentModal();
                setTimeout(forceReSync, 300);
            };

            // QR 로직
            const qrBtn = document.getElementById('show-bank-qr-btn');
            qrBtn.onclick = () => {
                const qrArea = document.getElementById('payment-qr-area');
                document.getElementById('payment-qrcode').innerHTML = '';
                const sum = Object.values(session.orders).reduce((sm, o) => sm + o.total_price, 0);
                const orderNo = Object.values(session.orders).find(o => o.order_no)?.order_no || 'T'+session.table_id;
                const payUrl = `${window.location.origin}/{{ store.id }}/payment_info?amount=${sum}&memo=${orderNo}`;
                new QRCode(document.getElementById('payment-qrcode'), { text: payUrl, width: 150, height: 150 });
                qrArea.style.display = 'block';
            };

            // 영수증 버튼
            const rcptBtn = document.getElementById('view-mobile-receipt-btn');
            const firstO = Object.values(session.orders)[0];
            rcptBtn.onclick = () => window.open(`/receipt/${firstO.id}`, '_blank');
        }

        function closePaymentModal() { document.getElementById('payment-modal').style.display = 'none'; }
        function createNotif(type, d) {
            const stack = document.getElementById('notif-stack');
            const card = document.createElement('div');
            card.className = 'notif';
            card.style.background = type === 'pay' ? '#059669' : '#dc2626';
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; font-size:0.75rem; margin-bottom:5px;"><b>${type==='pay'?'💳 입금 알림':'🔔 호출'}</b> <span onclick="this.parentElement.parentElement.remove()" style="cursor:pointer;">✕</span></div>
                <div style="font-weight:bold;">${d.sender || `테이블 ${d.table_id}`}</div>
                <div>${d.amount ? d.amount.toLocaleString()+'원' : d.content || '직원을 호출했습니다.'}</div>
                <button onclick="confirmTask(this, '${type}', '${d.id}')" style="width:100%; margin-top:10px; background:rgba(255,255,255,0.2); border:none; color:#fff; padding:5px; border-radius:5px; cursor:pointer;">확인됨</button>
            `;
            stack.prepend(card);
            try { new Audio("https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3").play(); } catch(e){}
        }

        async function confirmTask(btn, type, id) {
            const url = type === 'pay' ? `/api/{{ store.id }}/bank_notification/${id}/confirm` : `/api/{{ store.id }}/service_request/${id}/complete`;
            if(id && id !== 'undefined') await fetch(url, { method: 'POST' });
            btn.parentElement.remove();
            if(type === 'call') loadServiceRequests();
        }

        async function loadServiceRequests() {
            try {
                const res = await fetch(`/api/{{ store.id }}/service_requests`);
                const reqs = await res.json();
                const list = document.getElementById('service-request-list');
                list.innerHTML = reqs.length ? '' : '<div style="text-align:center; color:#444; padding:40px 0;">호출이 없습니다.</div>';
                reqs.forEach(r => {
                    const div = document.createElement('div');
                    div.className = 'post-it';
                    div.innerHTML = `
                        <div class="note-header"><span>🔔 CALL</span><span>${r.time}</span></div>
                        <div class="note-content">${r.table_id}번 입구/좌석<br>${r.content}</div>
                        <div class="note-footer">터치하여 확인 처리</div>
                    `;
                    div.onclick = async () => {
                        div.classList.add('removing');
                        setTimeout(async () => {
                            await confirmTask(div, 'call', r.id);
                        }, 300);
                    };
                    list.appendChild(div);
                });
            } catch(e){}
        }

        async function loadWaitingList() {
            const res = await fetch('/api/{{ store.id }}/waiting/list');
            const list = await res.json();
            const el = document.getElementById('waiting-list');
            el.innerHTML = list.length ? '' : '<div style="text-align:center; color:#444; padding:40px 0;">대기자가 없습니다.</div>';
            list.forEach(w => {
                const d = document.createElement('div');
                d.className = 'post-it waiting-note';
                d.innerHTML = `
                    <div class="note-header"><span>🕒 WAITING</span><span>${w.party_size}명</span></div>
                    <div class="note-content">${w.name}<br><small style="font-size:0.85rem;">${w.phone}</small></div>
                    <div class="note-footer">눌러서 입장 처리</div>
                `;
                d.onclick = async () => {
                    d.classList.add('removing');
                    setTimeout(async () => {
                        await executeEnter(w.id);
                    }, 300);
                };
                el.appendChild(d);
            });
        }

        async function executeEnter(id) {
            await fetch(`/api/{{ store.id }}/waiting/enter/${id}`, { method: 'POST' });
            loadWaitingList();
        }

        async function totalReset() {
            if(confirm('모든 데이터를 초기화하시겠습니까?')) {
                await fetch(`/api/{{ store.id }}/stats/reset`, { method: 'POST' });
                location.reload();
            }
        }

        // 시계 및 초기화
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        window.onload = () => { loadServiceRequests(); loadWaitingList(); lucide.createIcons(); };

    </script>
</body>
</html>
