<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ store.name }} - 계좌이체 안내</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap">
    <style>
        body {
            background-color: #0F0F0F;
            color: #f5f5f5;
            margin: 0;
            padding: 20px;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px 20px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .icon { font-size: 3.5rem; margin-bottom: 20px; }
        .store-name { color: #D4AF37; font-size: 1.5rem; font-weight: 900; margin-bottom: 5px; }
        .title { font-size: 1.1rem; margin-bottom: 30px; opacity: 0.8; }
        
        .bank-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #444;
            margin-bottom: 30px;
        }
        .bank-name { font-size: 1rem; color: #888; margin-bottom: 8px; }
        .account-no { font-size: 1.4rem; font-weight: bold; color: #fff; margin-bottom: 10px; letter-spacing: 0.5px; }
        .account-holder { font-size: 1.1rem; color: #D4AF37; }

        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 12px;
            transition: transform 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn:active { transform: scale(0.98); }
        .btn-toss { background: #0064ff; color: white; }
        .btn-copy { background: #333; color: white; }
        
        .toast {
            position: fixed;
            bottom: 30px;
            background: rgba(212, 175, 55, 0.95);
            color: #000;
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🏦</div>
        <div class="store-name">{{ store.name }}</div>
        <div class="title">무통장 입금 계좌 안내</div>
        
        {% if store.bank_name and store.account_no %}
        <div class="bank-card">
            <div class="bank-name">{{ store.bank_name }}</div>
            <div id="acc-no" class="account-no">{{ store.account_no }}</div>
            <div class="account-holder">예금주: {{ store.account_holder or store.name }}</div>
        </div>
        
        <a href="supertoss://send?bank={{ store.bank_name }}&accountNo={{ store.account_no }}" class="btn btn-toss">토스로 바로 송금</a>
        <button onclick="copyAccount()" class="btn btn-copy">계좌번호 복사</button>
        {% else %}
        <div style="padding: 40px; opacity: 0.5;">계좌 정보가 등록되지 않았습니다.</div>
        {% endif %}
    </div>

    <div id="toast" class="toast">복사 완료!</div>

    <script>
        function copyAccount() {
            const acc = document.getElementById('acc-no').innerText;
            navigator.clipboard.writeText(acc).then(() => {
                const toast = document.getElementById('toast');
                toast.style.opacity = '1';
                setTimeout(() => toast.style.opacity = '0', 2000);
            });
        }
    </script>
</body>
</html>
