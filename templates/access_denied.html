<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>접근 권한 없음 - MQnet Central</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Pretendard', sans-serif; }
        .error-container { text-align: center; padding: 40px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 500px; width: 90%; }
        .error-icon { font-size: 80px; color: #6f42c1; margin-bottom: 20px; }
        h1 { font-size: 24px; font-weight: 700; color: #333; margin-bottom: 15px; }
        p { color: #666; margin-bottom: 30px; line-height: 1.6; }
        .btn-home { background-color: #6f42c1; color: white; border: none; padding: 12px 30px; border-radius: 10px; font-weight: 600; transition: all 0.3s; text-decoration: none; display: inline-block; }
        .btn-home:hover { background-color: #59359a; color: white; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(111, 66, 193, 0.3); }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">
            <i class="fas fa-lock"></i>
        </div>
        <h1>접근 권한이 없습니다</h1>
        <p>요청하신 페이지에 접근할 수 있는 권한이 없거나,<br>로그인 세션이 만료되었습니다.<br>관리자에게 문의하시거나 다시 로그인해 주세요.</p>
        <a href="/" class="btn-home">메인 화면으로 돌아가기</a>
    </div>
</body>
</html>
