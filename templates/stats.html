<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ store.name }} | 통계</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root {
            --primary: #3b82f6; --accent: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --bg: #0b1121; --card: #161c2d; --border: rgba(255,255,255,0.12); --text: #f8fafc;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; margin: 0; min-height: 100vh; -webkit-font-smoothing: antialiased; }
        .stats-container { max-width: 1100px; margin: 0 auto; padding: 25px; }
        
        .nav-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 30px; padding: 20px 30px; 
            background: rgba(255, 255, 255, 0.04); border-radius: 24px; border: 1px solid var(--border);
        }

        .period-tabs {
            display: flex; gap: 10px; margin-bottom: 30px; 
            background: rgba(0,0,0,0.3); padding: 8px; border-radius: 18px;
        }
        .tab-btn {
            flex: 1; padding: 14px; background: none; border: none;
            color: #94a3b8; border-radius: 12px; cursor: pointer;
            font-size: 1rem; font-weight: 800; transition: 0.2s;
        }
        .tab-btn.active { background: var(--primary); color: #fff; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }

        .stat-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 35px;
            margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .sales-value { font-size: 3.5rem; font-weight: 1000; color: #fff; margin: 15px 0; letter-spacing: -1px; }
        .label-text { font-size: 1rem; color: #94a3b8; text-transform: uppercase; font-weight: 800; letter-spacing: 1.5px; }

        .item-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 18px 0; border-bottom: 1px solid var(--border);
        }
        .item-row:last-child { border: none; }

        .table-box { border-radius: 20px; overflow: hidden; border: 1px solid var(--border); margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 1.05rem; }
        th { background: rgba(255,255,255,0.05); padding: 20px; text-align: left; color: #94a3b8; font-weight: 800; font-size: 0.9rem; text-transform: uppercase; }
        td { padding: 20px; border-top: 1px solid var(--border); color: #e2e8f0; }

        .btn-action {
            background: rgba(255,255,255,0.08); border: 1px solid var(--border);
            color: #fff; padding: 10px 20px; border-radius: 12px; cursor: pointer;
            text-decoration: none; font-size: 1rem; font-weight: 800; display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-action:hover { background: var(--primary); border-color: var(--primary); transform: translateY(-2px); transition: 0.2s; }
    </style>
</head>
<body>
    <div class="stats-container">
        <div class="nav-header">
            <h1 style="font-size: 1.2rem; font-weight: 900; margin: 0; color: var(--primary);">{{ store.name }}</h1>
            <div style="display: flex; gap: 10px;">
                <button onclick="resetStats()" class="btn-action" style="color: var(--danger);"><i data-lucide="rotate-ccw" size="14"></i> 초기화</button>
                <a href="/{{ store.id }}/counter" class="btn-action">카운터</a>
            </div>
        </div>

        <div class="period-tabs">
            <button class="tab-btn active" onclick="changePeriod('today', this)">오늘</button>
            <button class="tab-btn" onclick="changePeriod('week', this)">주간</button>
            <button class="tab-btn" onclick="changePeriod('month', this)">월간</button>
            <button class="tab-btn" onclick="changePeriod('year', this)">연간</button>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
            <div class="stat-card">
                <span class="label-text" id="period-label">오늘의 매출</span>
                <div class="sales-value" id="sales-total">0원</div>
                <span style="font-size: 0.7rem; color: #475569;" id="period-sub">기준: -</span>
            </div>

            <div class="stat-card">
                <span class="label-text">인기 메뉴 TOP 5</span>
                <div id="best-menu-list" style="margin-top: 15px;">
                    <!-- JS population -->
                </div>
            </div>
        </div>

        <div class="stat-card" style="margin-top: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <span class="label-text">우수 고객 현황</span>
                <span id="cust-count" style="font-size: 0.75rem; color: #4b5563;">0명</span>
            </div>
            <div class="table-box">
                <table>
                    <thead>
                        <tr>
                            <th>번호</th>
                            <th style="text-align: center;">방문</th>
                            <th style="text-align: right;">지출</th>
                        </tr>
                    </thead>
                    <tbody id="customer-list">
                        <!-- JS population -->
                    </tbody>
                </table>
            </div>
        </div>

        <div class="stat-card" style="margin-top: 20px;">
            <span class="label-text">판매 수량 추이</span>
            <div style="margin-top: 20px;">
                <canvas id="menuChart" style="max-height: 300px;"></canvas>
            </div>
        </div>
    </div>

    <script>
        let chart = null;
        let currentPeriod = 'today';

        async function changePeriod(period, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const labels = {'today': '오늘의 매출', 'week': '주간 매출 합계', 'month': '월간 매출 합계', 'year': '연간 매출 합계'};
            document.getElementById('period-label').innerText = labels[period];
            currentPeriod = period;
            loadStats();
        }

        async function resetStats() {
            if (!confirm('초기화?')) return;
            const res = await fetch('/api/{{ store.id }}/stats/reset', { method: 'POST' });
            if ((await res.json()).status === 'success') loadStats();
        }

        async function loadStats() {
            try {
                const res = await fetch(`/api/{{ store.id }}/stats?period=${currentPeriod}`);
                const data = await res.json();
                
                document.getElementById('sales-total').innerText = (data.sales || 0).toLocaleString() + '원';
                document.getElementById('period-sub').innerText = `시작일: ${data.start_date || '-'}`;
                
                const list = document.getElementById('best-menu-list');
                list.innerHTML = '';
                if (data.best_menu && data.best_menu.length > 0) {
                    data.best_menu.forEach((item, index) => {
                        const div = document.createElement('div');
                        div.className = 'item-row';
                        div.innerHTML = `
                            <span style="font-size: 1.1rem;">${index + 1}. <span style="font-weight:800; color:#fff;">${item.name}</span></span>
                            <span style="font-weight: 950; color: var(--primary); font-size: 1.2rem;">${item.count}</span>
                        `;
                        list.appendChild(div);
                    });
                } else {
                    list.innerHTML = '<div style="text-align:center; color:#94a3b8; padding:30px; font-size:1.1rem;">데이터 없음</div>';
                }

                const custRes = await fetch(`/api/{{ store.id }}/customers`);
                const customers = await custRes.json();
                const clist = document.getElementById('customer-list');
                document.getElementById('cust-count').innerText = `전체 ${customers.length}명`;
                clist.innerHTML = '';
                customers.slice(0, 5).forEach(c => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="color: #fff; font-weight:800; font-size:1.1rem;">${c.phone}</td>
                        <td style="text-align: center; font-weight:800;">${c.visit_count}</td>
                        <td style="text-align: right; font-weight: 950; color: var(--accent); font-size:1.1rem;">${(c.total_spent || 0).toLocaleString()}</td>
                    `;
                    clist.appendChild(tr);
                });

                updateChart(data.best_menu || []);
                lucide.createIcons();
            } catch (e) { console.error(e); }
        }

        function updateChart(bestMenu) {
            const ctx = document.getElementById('menuChart').getContext('2d');
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: bestMenu.map(m => m.name),
                    datasets: [{
                        label: '판매량',
                        data: bestMenu.map(m => m.count),
                        backgroundColor: '#3b82f6',
                        borderRadius: 8,
                        barThickness: 25
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            grid: { color: 'rgba(255,255,255,0.08)' }, 
                            ticks: { color: '#94a3b8', font: { size: 12, weight: 'bold' } } 
                        },
                        x: { 
                            grid: { display: false }, 
                            ticks: { color: '#94a3b8', font: { size: 13, weight: 'bold' } } 
                        }
                    },
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#1e293b',
                            titleFont: { size: 14, weight: 'bold' },
                            bodyFont: { size: 13 },
                            padding: 12,
                            cornerRadius: 10
                        }
                    }
                }
            });
        }
        window.onload = loadStats;
    </script>
</body>
</html>
