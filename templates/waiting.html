<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수라골 참숯갈비 - 웨이팅 등록</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        .waiting-box {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            border: 1px solid var(--border-color);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            margin-top: 40px;
        }
        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .form-input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-input:focus {
            border-color: var(--secondary-color);
        }
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(192, 57, 43, 0.3);
        }
        .status-badge {
            font-size: 3rem;
            color: var(--secondary-color);
            font-weight: 900;
            margin: 20px 0;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }
        .info-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
        }
        .info-val {
            font-size: 1.3rem;
            font-weight: bold;
            display: block;
            margin-top: 5px;
        }

        /* 커스텀 입장 안내창 스타일 */
        #entry-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            text-align: center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            color: #90EE90; /* 연녹색 */
            font-size: 1.8rem; /* 기존 1.4rem 기준 약 1.3배 */
            font-weight: 900;
            line-height: 1.6;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-btn {
            margin-top: 30px;
            padding: 12px 40px;
            background: #90EE90;
            color: #111;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(144, 238, 144, 0.4);
            transition: transform 0.2s;
        }
        .modal-btn:active {
            transform: scale(0.95);
        }

        /* 2단계 입장 안내 페이지 전용 스타일 */
        #wait-entry-container {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 120px);
            text-align: center;
            animation: fadeIn 0.8s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .entry-card {
            background: rgba(139, 0, 0, 0.15);
            border: 2px solid var(--secondary-color);
            border-radius: 30px;
            padding: 50px 30px;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
            width: 100%;
            max-width: 400px;
        }
        .entry-title {
            font-size: 2.2rem;
            color: #90EE90;
            font-weight: 900;
            margin-bottom: 20px;
            line-height: 1.4;
            word-break: keep-all;
        }
        .entry-msg {
            font-size: 1.2rem;
            color: #ccc;
            margin-bottom: 40px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <header style="justify-content: center;">
        <div class="brand-box" style="align-items: center;">
            <div class="brand-chinese">水剌</div>
            <div class="brand-korean">수라골 참숯갈비 웨이팅</div>
        </div>
    </header>

    <!-- 커스텀 모달 (안내/입장 범용) -->
    <div id="entry-modal">
        <div class="modal-content">
            <div id="modal-body" style="word-break: keep-all;">
                <!-- 메시지 내용이 여기에 들어갑니다 -->
                기다려 주셔서 감사합니다.<br>
                입장해주세요!
            </div>
            <button id="modal-ok-btn" class="modal-btn">확인</button>
        </div>
    </div>

    <div class="container" style="max-width: 500px; margin: 0 auto; padding: 15px;">
        <div id="wait-form-container">
            <div class="waiting-box">
                <h2 style="margin-bottom: 30px;">대기 등록</h2>
                <div class="form-group">
                    <label>휴대폰 번호</label>
                    <input type="tel" id="phone" class="form-input" placeholder="010-0000-0000" maxlength="13">
                </div>
                <div class="form-group">
                    <label>방문 인원</label>
                    <select id="people" class="form-input" style="appearance: none;">
                        {% for i in range(1, 11) %}
                        <option value="{{ i }}">{{ i }}명</option>
                        {% endfor %}
                    </select>
                </div>
                <button class="submit-btn" onclick="registerWait()">등록하기</button>
            </div>
        </div>

        <div id="wait-status-container" style="display: none;">
            <div class="waiting-box">
                <div style="font-size: 1.1rem; color: var(--text-muted);">나의 대기 번호</div>
                <div id="my-wait-id" class="status-badge">--</div>
                <div id="msg-congrats" style="color: var(--secondary-color); font-weight: bold; margin-bottom: 20px;">대기 등록이 완료되었습니다.</div>
                
                <div class="info-grid">
                    <div class="info-card">
                        <span style="font-size: 0.85rem; color: var(--text-muted);">현재 대기</span>
                        <span id="current-rank" class="info-val">--팀</span>
                    </div>
                    <div class="info-card">
                        <span style="font-size: 0.85rem; color: var(--text-muted);">예상 시간</span>
                        <span id="est-time" class="info-val">--분</span>
                    </div>
                    </div>
                </div>

                <div style="font-size: 0.85rem; color: #7f8c8d; margin-top: 15px; display: flex; justify-content: center; align-items: center; gap: 5px;">
                    <i class="fas fa-clock"></i> <span>등록 시간: <strong id="created-at-display">--</strong></span>
                </div>

                <div style="margin-top:25px; display:flex; flex-direction:column; gap:12px;">
                    <button class="submit-btn" onclick="cancelAndReregister()" style="background: #e67e22; box-shadow: 0 10px 20px rgba(230, 126, 34, 0.3); font-size: 0.95rem;">
                        인원 변경 또는 다시 등록하기
                    </button>
                    <button class="submit-btn" onclick="location.reload()" style="background: #34495e; box-shadow: 0 10px 20px rgba(52, 73, 94, 0.2); font-size: 0.95rem;">
                        내 순번 확인 (새로고침)
                    </button>
                </div>

                <div style="margin-top: 35px; font-size: 0.95rem; color: #888; line-height: 1.7; text-align: center; word-break: keep-all; padding: 0 10px;">
                    순서가 가까워지면(3팀 이내) 카카오톡이나 SMS로<br>
                    알림을 보내드립니다. 매장 근처에서 대기해 주세요.
                </div>
            </div>
        </div>

        <!-- 2단계: 입장 안내 전용 페이지 -->
        <div id="wait-entry-container">
            <div class="entry-card">
                <div class="entry-title">
                    기다려 주셔서 감사합니다!<br>
                    지금 입장해 주세요.
                </div>
                <p class="entry-msg">도착하셔서 직원에게<br>이 화면을 보여주세요.</p>
                <button class="submit-btn" onclick="finishEntry()" style="background: #2ecc71; box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3);">
                    입장 확인 및 창 닫기
                </button>
            </div>
        </div>
    </div>

    <!-- 입장 알림음 -->
    <audio id="entry-chime" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        const socket = io();
        let myWaitId = localStorage.getItem('wang_gung_wait_id');

        // 접속 시 서버에 화면이 켜져있음을 알림 (SMS 전송 생략 목적)
        socket.on('connect', () => {
            if (myWaitId) {
                socket.emit('customer_online', { wait_id: myWaitId });
            }
        });

        window.onload = async () => {
            if (myWaitId) {
                // 저장된 ID가 있으면 서버에서 현재 상태를 다시 확인
                await showStatus();
            }
        };

        let isEntryAlerted = false; // 중복 알림 방지 플래그

        // 실시간 입장 신호 감지 (소켓 사용)
        socket.on('waiting_status_update', (data) => {
            // 내 번호에 대한 알림일 때만 반응
            if (data.wait_id == myWaitId && data.status === 'entered' && !isEntryAlerted) {
                isEntryAlerted = true;
                showEntryPage();
            }
        });

        // 다른 사람이 입장하여 전체 대기열이 변했을 때만 정보를 갱신
        socket.on('waiting_update', () => {
            if (myWaitId && !isEntryAlerted) showStatus();
        });

        // 커스텀 알림창 함수 (IP 주소 노출 방지)
        function customAlert(message, onConfirm = null) {
            document.getElementById('modal-body').innerHTML = message;
            const modal = document.getElementById('entry-modal');
            const btn = document.getElementById('modal-ok-btn');
            
            modal.style.display = 'flex';
            
            btn.onclick = () => {
                modal.style.display = 'none';
                if (onConfirm) onConfirm();
            };
        }

        function showEntryPage() {
            // 모든 대기 정보 숨기고 '입장 안내 페이지' 표시
            document.getElementById('wait-form-container').style.display = 'none';
            document.getElementById('wait-status-container').style.display = 'none';
            document.getElementById('wait-entry-container').style.display = 'flex';
            
            // 알림음 재생
            const chime = document.getElementById('entry-chime');
            chime.play().catch(e => console.log('Audio Autoplay Blocked:', e));
        }

        function finishEntry() {
            localStorage.removeItem('wang_gung_wait_id');
            // 브라우저 창 닫기 시도 (카카오톡, 삼성인터넷 등 일부 브라우저 지원)
            if (window.close) {
                window.close();
            }
            // 창 닫기가 브라우저 보안으로 막힌 경우를 위한 안내 화면
            document.body.innerHTML = `
                <div style="display:flex; height:100vh; align-items:center; justify-content:center; text-align:center; flex-direction:column; background-color:#1e1e1e; padding: 20px; box-sizing: border-box;">
                    <div style="background-color:#2c3e50; border-radius:15px; padding:30px; border:2px solid #e1b12c; box-shadow:0 15px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px;">
                        <h2 style="color:#2ecc71; margin-bottom:15px; font-size:1.8rem;">입장 확인 완료</h2>
                        <p style="color:#ddd; font-size:1.1rem; line-height:1.6;">맛있게 드세요!<br><br>이제 이 화면(브라우저)을<br>닫으셔도 됩니다.</p>
                    </div>
                </div>
            `;
        }

        function cancelAndReregister() {
            if (confirm('현재 대기를 취소하고 인원 변경 등을 위해 새로 등록하시겠습니까?\n(기존 대기 순서는 사라지고 맨 뒤로 이동합니다.)')) {
                localStorage.removeItem('wang_gung_wait_id');
                location.reload();
            }
        }

        async function registerWait() {
            const phone = document.getElementById('phone').value.trim();
            const people = document.getElementById('people').value;

            if (!phone) {
                customAlert('전화번호를 입력해 주세요.');
                return;
            }

            try {
                const res = await fetch('/api/waiting', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, people })
                });
                const data = await res.json();
                
                if (data.status === 'success') {
                    myWaitId = data.wait_id;
                    localStorage.setItem('wang_gung_wait_id', myWaitId);
                    socket.emit('customer_online', { wait_id: myWaitId }); // 바로 온라인 알림 설정
                    showStatus();
                } else {
                    customAlert('등록 실패: ' + data.message);
                }
            } catch (e) {
                customAlert('오류 발생: ' + e);
            }
        }

        // 이제 백그라운드 타이머 대신 소켓을 주력으로 사용합니다. fallback이 필요한 경우만 수동 새로고침 권장.

        async function showStatus() {
            if (!myWaitId || isEntryAlerted) return;
            
            try {
                const res = await fetch(`/api/waiting/status/${myWaitId}`);
                const data = await res.json();

                if (data.status === 'entered') {
                    isEntryAlerted = true;
                    showEntryPage();
                    return;
                }
                
                if (data.status === 'expired' || data.status === 'not_found') {
                    localStorage.removeItem('wang_gung_wait_id');
                    location.reload();
                    return;
                }

                document.getElementById('wait-form-container').style.display = 'none';
                document.getElementById('wait-status-container').style.display = 'block';
                document.getElementById('my-wait-id').innerText = data.waiting_no;
                document.getElementById('current-rank').innerText = data.rank + '팀';
                document.getElementById('est-time').innerText = (data.rank * 10) + '분';
                
                if (data.created_at_fixed) {
                    document.getElementById('created-at-display').innerText = data.created_at_fixed;
                }

            } catch (e) {
                console.error('Status Error:', e);
            }
        }

        // 전화번호 자동 하이픈
        document.getElementById('phone').addEventListener('input', function(e) {
            let val = e.target.value.replace(/[^0-9]/g, '');
            if (val.length > 3 && val.length <= 7) {
                val = val.slice(0, 3) + '-' + val.slice(3);
            } else if (val.length > 7) {
                val = val.slice(0, 3) + '-' + val.slice(3, 7) + '-' + val.slice(7);
            }
            e.target.value = val;
        });
    </script>
</body>
</html>
