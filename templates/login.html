<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQnet - 로그인</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background: #0a0a0a;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Pretendard', sans-serif;
        }
        .login-card {
            background: #1a1a1a;
            padding: 3rem;
            border-radius: 24px;
            border: 1px solid #333;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        h2 { margin-bottom: 2rem; font-weight: 900; text-align: center; color: #3498db; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 8px; color: #888; font-size: 0.9rem; }
        input {
            width: 100%;
            padding: 15px;
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }
        input:focus { border-color: #3498db; outline: none; }
        .login-btn {
            width: 100%;
            padding: 15px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 1rem;
        }
        .login-btn:hover { background: #2980b9; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>MQnet Central</h2>
        <form method="POST">
            <div class="input-field">
                <label>ID</label>
                <input type="text" name="username" placeholder="아이디를 입력하세요" required>
            </div>
            <div class="input-field">
                <label>Password</label>
                <input type="password" name="password" placeholder="비밀번호를 입력하세요" required>
            </div>
            <button type="submit" class="login-btn">로그인</button>
        </form>
    </div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <script>
          alert("{{ messages[0] }}");
        </script>
      {% endif %}
    {% endwith %}
</body>
</html>
